<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121212] text-white min-h-screen">
    <nav class="p-6 flex justify-between items-center border-b border-gray-800">
        <a href="{% url 'home' %}" class="text-2xl font-black italic tracking-tighter">SECURE<span class="text-[#026cdf]">TIX</span></a>
        <div class="space-x-6 text-sm font-semibold">
            {% if user.is_authenticated %}
                <a href="{% url 'profile' %}" class="hover:text-[#026cdf]">My Tickets</a>
                <a href="{% url 'logout' %}" class="bg-gray-800 px-4 py-2 rounded-lg hover:bg-red-900">Sign Out</a>
                <div style="background: red; padding: 20px; color: white;">THIS IS THE BASE TEMPLATE</div>
            {% else %}
                <a href="{% url 'login' %}" class="hover:text-[#026cdf]">Login</a>
                <a href="{% url 'register' %}" class="bg-[#026cdf] px-4 py-2 rounded-lg hover:bg-[#0050a8]">Register</a>
            {% endif %}
        </div>
    </nav>
    <main class="p-10">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
