{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black uppercase">My Tickets</h1>
        <a href="{% url 'home' %}" class="bg-[#1e1e1e] border border-gray-700 px-4 py-2 rounded-lg hover:bg-gray-800 transition">Browse Concerts</a>
    </div>

    <div class="space-y-4">
        {% for booking in bookings %}
            <div class="bg-[#1e1e1e] p-6 rounded-xl border border-gray-800 flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold text-[#026cdf]">{{ booking.concert.title }}</h2>
                    <p class="text-sm text-gray-400">Date: {{ booking.concert.date }}</p>
                </div>
                <span class="text-green-500 font-bold bg-green-900/20 px-3 py-1 rounded-full text-xs">CONFIRMED</span>
            </div>
        {% empty %}
            <div class="text-center py-20 border-2 border-dashed border-gray-800 rounded-xl">
                <h3 class="text-xl font-bold mb-2">No tickets yet</h3>
                <p class="text-gray-400 mb-6">Your booked events will appear here.</p>
                <a href="{% url 'home' %}" class="bg-[#026cdf] px-6 py-3 rounded-lg font-bold hover:bg-[#0050a8] transition">Explore Concerts</a>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
